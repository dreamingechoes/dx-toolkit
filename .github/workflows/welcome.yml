# ──────────────────────────────────────────────────────────────
# 👋 Welcome — Greet First-Time Contributors
# ──────────────────────────────────────────────────────────────
# Posts a welcome message on first issues and first PRs from
# new contributors. Helps set expectations and points to
# relevant documentation.
# ──────────────────────────────────────────────────────────────

name: 👋 Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: welcome-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  welcome:
    name: 👋 Welcome
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 👋 Greet first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! 👋

            A maintainer will take a look soon. In the meantime:

            - Make sure you've read [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)
            - Check existing [issues](https://github.com/${{ github.repository }}/issues) to avoid duplicates
            - Add as much detail as possible to help us understand the problem or suggestion

            We appreciate your contribution to the DX Toolkit!
          pr-message: |
            Thanks for your first pull request! 👋

            A maintainer will review your changes soon. Before that happens, please make sure:

            - [ ] Your PR title follows [Conventional Commits](https://www.conventionalcommits.org/) (e.g., `feat: add new agent`)
            - [ ] You've read [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)
            - [ ] All CI checks pass
            - [ ] Documentation is updated if you've added or changed functionality

            Thanks for contributing to the DX Toolkit!
