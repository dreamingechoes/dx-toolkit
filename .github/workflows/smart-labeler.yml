# ──────────────────────────────────────────────────────────────
# 🏷️ Smart Issue & PR Labeler — Standalone Workflow
# ──────────────────────────────────────────────────────────────
# Analyzes issues and PRs to assign the most appropriate labels
# from the existing label set. Removes incorrect labels and
# optionally creates new ones when truly needed.
# ──────────────────────────────────────────────────────────────

name: 🏷️ Smart Issue & PR Labeler

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: smart-labeler-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smart-label:
    name: 🏷️ Analyze and Label
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🔐 Verify author is repo owner
        id: author_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          author=""
          if [ "$EVENT_NAME" = "issues" ]; then
            author="$ISSUE_AUTHOR"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            author="$PR_AUTHOR"
          fi

          allowed="false"
          if [ "$author" = "$REPO_OWNER" ]; then
            allowed="true"
          fi

          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
          if [ "$allowed" != "true" ]; then
            echo "⏭️ Skipping: author '$author' is not repository owner '$REPO_OWNER'."
          fi

      - name: 📥 Checkout repository
        if: steps.author_check.outputs.allowed == 'true'
        uses: actions/checkout@v5

      - name: 📦 Install GitHub Copilot CLI
        if: steps.author_check.outputs.allowed == 'true'
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

      - name: 🏷️ Analyze and assign labels
        if: steps.author_check.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          ITEM_TYPE: ${{ github.event_name == 'issues' && 'issue' || 'pull_request' }}
          ITEM_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ITEM_TITLE: ${{ github.event.issue.title || github.event.pull_request.title }}
          ITEM_BODY: ${{ github.event.issue.body || github.event.pull_request.body }}
          MODEL: "claude-sonnet-4"
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          copilot -p "
          You are a smart labeling assistant for the repository '${{ github.repository }}'.
          Your task is to analyze a $ITEM_TYPE and ensure it has the correct labels.

          ITEM DETAILS:
          - Type: $ITEM_TYPE
          - Number: #$ITEM_NUMBER
          - Title: $ITEM_TITLE
          - Body: $ITEM_BODY

          Follow these steps:

          ──────────────────────────────────────────────
          STEP 1 — FETCH AVAILABLE LABELS
          ──────────────────────────────────────────────
          Use the GitHub MCP Server to list ALL available labels in this repository.
          SAVE this list — you will ONLY use labels from this list.
          DO NOT create new labels unless absolutely necessary (step 6).

          ──────────────────────────────────────────────
          STEP 2 — CHECK CURRENT LABELS
          ──────────────────────────────────────────────
          Use the GitHub MCP Server to get the current labels on $ITEM_TYPE #$ITEM_NUMBER.
          Note which labels are already assigned.

          ──────────────────────────────────────────────
          STEP 3 — CHECK DISCUSSION ORIGIN
          ──────────────────────────────────────────────
          Check if this issue was created from a Discussion:
          - Look in the body for references to discussions (e.g., 'Created from discussion #X')
          - If it was, get that discussion's labels as hints for this item.

          ──────────────────────────────────────────────
          STEP 4 — ANALYZE CONTENT
          ──────────────────────────────────────────────
          Analyze the title and body to determine what this $ITEM_TYPE is about:
          - Bug report → 'bug'
          - Feature request → 'enhancement'
          - Documentation → 'documentation'
          - Security → 'security' (if exists)
          - Performance → 'performance' (if exists)
          - Testing → 'testing' (if exists)
          - CI/CD → 'ci' or 'github-actions' (if exists)
          - Dependencies → 'dependencies' (if exists)
          - Question → 'question'
          - Good first issue → 'good first issue'
          - UI/UX → 'design' or 'ux' (if exists)
          - Refactoring → 'refactoring' (if exists)

          For Pull Requests specifically:
          - Bug fix → 'bug'
          - New feature → 'enhancement'
          - Breaking change → 'breaking-change' (if exists)
          - Minor fix → 'minor' (if exists)

          ──────────────────────────────────────────────
          STEP 5 — COMPARE AND UPDATE
          ──────────────────────────────────────────────
          Compare what labels SHOULD be on this $ITEM_TYPE vs what is currently assigned:
          - If current labels are correct and complete → do nothing
          - If labels are missing → add them
          - If labels are wrong/irrelevant → remove them and add correct ones
          - Aim for 1-3 labels per item — do not over-label

          Use the GitHub MCP Server to update labels on $ITEM_TYPE #$ITEM_NUMBER.

          ──────────────────────────────────────────────
          STEP 6 — CREATE NEW LABELS (RARE)
          ──────────────────────────────────────────────
          ONLY if there is a clear category with no matching label:
          - Check if a similar label could work first.
          - Only create if no existing label fits AND the category will be reused.
          - Use appropriate colors (red=bugs, green=enhancements, blue=docs, etc.)
          - This should be RARE — prefer existing labels.

          IMPORTANT GUIDELINES:
          - PRIORITIZE existing labels — do not create new ones unless truly needed.
          - Keep the label count reasonable (1-3 labels is ideal).
          - Remove incorrect labels — fewer correct labels is better than many wrong ones.
          - Be conservative — when in doubt, do not add a label.
          " --allow-all-tools --model "$MODEL"

          echo "✅ Smart labeling completed for $ITEM_TYPE #$ITEM_NUMBER"
