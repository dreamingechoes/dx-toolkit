# ──────────────────────────────────────────────────────────────
# 🛡️ PR Checks — Pull Request Quality Gates
# ──────────────────────────────────────────────────────────────
# Validates PR title follows Conventional Commits, applies
# labels based on changed paths, and checks PR size.
# Runs on every pull request targeting main.
# ──────────────────────────────────────────────────────────────

name: 🛡️ PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional-title:
    name: 📝 Conventional Commits Title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📝 Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must not be empty after the type prefix."

  labeler:
    name: 🏷️ Auto Label
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🏷️ Apply path-based labels
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  size-label:
    name: 📏 Size Label
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📏 Apply size label
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/xs"
          xs_max_size: 10
          s_label: "size/s"
          s_max_size: 50
          m_label: "size/m"
          m_max_size: 200
          l_label: "size/l"
          l_max_size: 500
          xl_label: "size/xl"
          fail_if_xl: false
          message_if_xl: >
            ⚠️ This PR is extra-large. Consider breaking it into smaller PRs
            for easier review. See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.
