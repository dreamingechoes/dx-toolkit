# ──────────────────────────────────────────────────────────────
# 📊 Code Coverage Report — Standalone Workflow
# ──────────────────────────────────────────────────────────────
# Parses code coverage reports, compares with base branch,
# comments on PR with coverage summary. Shows which files have
# low coverage, highlights dropped coverage. Fails if below
# minimum threshold.
# ──────────────────────────────────────────────────────────────

name: 📊 Code Coverage Report

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: code-coverage-${{ github.event.pull_request.number || 'manual' }}
  cancel-in-progress: true

jobs:
  coverage-report:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 📦 Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

      - name: 📊 Analyze coverage with AI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          COVERAGE_FILE: ${{ github.event.inputs.coverage_file || 'coverage/lcov.info' }}
          MIN_COVERAGE: ${{ github.event.inputs.min_coverage || '80' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
          MODEL: ${{ github.event.inputs.model || 'claude-sonnet-4' }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          copilot -p "
          You are a Code Coverage Analyzer for the repository '${{ github.repository }}'.
          Your job is to parse coverage reports, compare with the base branch,
          and provide actionable coverage insights.

          CONFIGURATION:
          - Coverage File: $COVERAGE_FILE
          - Minimum Coverage: $MIN_COVERAGE%
          - PR Number: $PR_NUMBER
          - Base Branch: $BASE_REF

          Follow these steps IN ORDER:

          ──────────────────────────────────────────────
          STEP 1 — LOCATE AND PARSE COVERAGE FILE
          ──────────────────────────────────────────────
          Read the coverage file at: $COVERAGE_FILE
          Detect the format:
          - lcov.info → LCOV format
          - coverage.xml → Cobertura XML
          - coverage.json → Istanbul JSON
          - coverage/clover.xml → Clover XML

          Extract per-file coverage data:
          - Lines covered / total lines
          - Branches covered / total branches
          - Functions covered / total functions

          If the file does not exist, report an error and stop.

          ──────────────────────────────────────────────
          STEP 2 — CALCULATE OVERALL COVERAGE
          ──────────────────────────────────────────────
          Compute:
          - Overall line coverage percentage
          - Overall branch coverage percentage
          - Overall function coverage percentage
          - Total lines / branches / functions

          ──────────────────────────────────────────────
          STEP 3 — IDENTIFY FILES CHANGED IN PR
          ──────────────────────────────────────────────
          If PR_NUMBER is set, use the GitHub MCP Server to get the
          list of files changed in the PR.
          Cross-reference with coverage data to find:
          - Changed files with NO coverage data (untested new code)
          - Changed files with LOW coverage (below $MIN_COVERAGE%)
          - Changed files where coverage DROPPED

          ──────────────────────────────────────────────
          STEP 4 — COMPARE WITH BASE BRANCH
          ──────────────────────────────────────────────
          If possible, compare current coverage against the base branch:
          - Overall coverage delta (+/- percentage)
          - Per-file coverage changes
          - New uncovered lines introduced in this PR

          ──────────────────────────────────────────────
          STEP 5 — COMPILE REPORT
          ──────────────────────────────────────────────
          Create a report:

          ## 📊 Code Coverage Report

          ### Overall Coverage
          | Metric | Coverage | Threshold | Status |
          |--------|----------|-----------|--------|
          | Lines | XX.X% | $MIN_COVERAGE% | ✅/❌ |
          | Branches | XX.X% | — | ℹ️ |
          | Functions | XX.X% | — | ℹ️ |

          ### 📉 Files with Low Coverage (< $MIN_COVERAGE%)
          | File | Lines | Branches | Change |
          |------|-------|----------|--------|
          | src/file.ts | 45.2% | 30.0% | -5.2% |

          ### 🆕 Changed Files Without Coverage
          - src/new-file.ts (added, 0% coverage)

          ### 📈 Coverage Trend
          - Base branch: XX.X%
          - This PR: XX.X%
          - Delta: +/-X.X%

          ──────────────────────────────────────────────
          STEP 6 — COMMENT ON PR
          ──────────────────────────────────────────────
          If PR_NUMBER is set:
          - Use the GitHub MCP Server to comment on PR #$PR_NUMBER
            with the report.
          - If overall coverage is below $MIN_COVERAGE%, clearly state
            that the check has FAILED.
          - Suggest which files need more test coverage.

          ──────────────────────────────────────────────
          STEP 7 — SET EXIT CODE
          ──────────────────────────────────────────────
          If overall line coverage is below $MIN_COVERAGE%, exit
          with code 1 to fail the workflow.

          IMPORTANT:
          - Focus on files changed in the PR — do not blame pre-existing
            low coverage on the PR author.
          - Distinguish between coverage drops caused by the PR vs
            already-low coverage in touched files.
          - Be specific: mention exact file names and line ranges
            that need coverage.
          - Do not count generated files, vendored code, or test
            files themselves in the coverage calculation.
          " --allow-all-tools --model "$MODEL"

          echo "✅ Coverage report complete"
