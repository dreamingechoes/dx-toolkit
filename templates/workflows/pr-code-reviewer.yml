# ──────────────────────────────────────────────────────────────
# 🔍 PR Code Reviewer — Standalone Workflow
# ──────────────────────────────────────────────────────────────
# AI-powered code review that analyzes PR diffs for bugs,
# security issues, performance problems, and best practices.
# Leaves an inline review with actionable feedback.
# ──────────────────────────────────────────────────────────────

name: 🔍 PR Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-pr:
    name: 🔍 AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🔐 Verify author is repo owner
        id: author_check
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          allowed="false"
          if [ "$PR_AUTHOR" = "$REPO_OWNER" ]; then
            allowed="true"
          fi
          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
          if [ "$allowed" != "true" ]; then
            echo "⏭️ Skipping: author '$PR_AUTHOR' is not repository owner '$REPO_OWNER'."
          fi

      - name: 📥 Checkout repository
        if: steps.author_check.outputs.allowed == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 📦 Install GitHub Copilot CLI
        if: steps.author_check.outputs.allowed == 'true'
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

      - name: 🔍 Perform AI code review
        if: steps.author_check.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REVIEW_FOCUS: "all"
          MODEL: "claude-sonnet-4"
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          copilot -p "
          You are an expert AI Code Reviewer for the repository '${{ github.repository }}'.
          Your job is to thoroughly review a pull request and provide actionable feedback.

          PULL REQUEST DETAILS:
          - Number: #$PR_NUMBER
          - Title: $PR_TITLE
          - Author: @$PR_AUTHOR
          - Review Focus: $REVIEW_FOCUS

          Follow these steps IN ORDER:

          ──────────────────────────────────────────────
          STEP 1 — UNDERSTAND THE PROJECT
          ──────────────────────────────────────────────
          - Read the repository README and CONTRIBUTING.md if they exist.
          - Understand the project's coding standards and conventions.
          - Scan the project structure to know the architecture.

          ──────────────────────────────────────────────
          STEP 2 — ANALYZE THE PR DIFF
          ──────────────────────────────────────────────
          Use the GitHub MCP Server to get the full diff of PR #$PR_NUMBER.
          For every changed file, analyze:

          a) **Bugs & Logic Errors**
             - Off-by-one errors, null/undefined handling, race conditions
             - Missing error handling, unhandled edge cases
             - Incorrect control flow or logic

          b) **Security Issues**
             - SQL injection, XSS, command injection
             - Hardcoded secrets or credentials
             - Missing input validation or sanitization
             - Insecure API calls, missing authentication checks
             - Path traversal vulnerabilities

          c) **Performance Concerns**
             - N+1 queries, unnecessary loops
             - Missing caching opportunities
             - Memory leaks, large allocations
             - Blocking operations in async contexts

          d) **Best Practices**
             - Code readability and naming conventions
             - DRY violations (duplicated code)
             - Missing type annotations or documentation
             - Inconsistent patterns with existing codebase
             - Missing tests for new code

          e) **Dependency and Configuration**
             - New dependencies that may be unnecessary
             - Breaking changes to public APIs
             - Missing migrations or env var updates

          ──────────────────────────────────────────────
          STEP 3 — LEAVE A REVIEW COMMENT
          ──────────────────────────────────────────────
          Use the GitHub MCP Server to add a review comment on PR #$PR_NUMBER with a
          structured summary:

          > 🔍 **AI Code Review for PR #$PR_NUMBER**
          >
          > **Overall Assessment:** [Excellent / Good / Needs Changes / Critical Issues]
          >
          > **Summary:** (2-3 sentences summarizing the changes)
          >
          > ### Findings
          > (Group by severity: 🔴 Critical → 🟡 Warning → 🟢 Suggestion)
          >
          > For each finding:
          > - **File:** \`path/to/file.ext:L42\`
          > - **Issue:** Clear description
          > - **Suggestion:** How to fix it
          >
          > ### What Looks Good ✅
          > (Positive feedback on well-written code)
          >
          > ---
          > 🤖 *Reviewed by Copilot AI Code Reviewer*

          IMPORTANT GUIDELINES:
          - Be constructive, not critical. Frame issues as suggestions.
          - Focus on substantive issues — skip trivial style nitpicks.
          - Acknowledge good patterns and well-written code.
          - If the code is clean, say so and keep the review brief.
          - Do NOT approve or reject the PR — only comment.
          - Prioritize findings by severity: critical bugs > security > performance > style.
          " --allow-all-tools --model "$MODEL"

          echo "✅ AI Code Review completed for PR #$PR_NUMBER"
