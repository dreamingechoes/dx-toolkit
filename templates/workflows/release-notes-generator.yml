# ──────────────────────────────────────────────────────────────
# 📋 Release Notes Generator — Standalone Workflow
# ──────────────────────────────────────────────────────────────
# Automatically generates comprehensive release notes from
# merged PRs and commits between two tags or a tag and HEAD.
# ──────────────────────────────────────────────────────────────

name: 📋 Release Notes Generator

on:
  release:
    types: [created]

permissions:
  contents: write

concurrency:
  group: release-notes-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  generate-notes:
    name: 📋 Generate Release Notes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 📦 Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

      - name: 📋 Generate release notes with AI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name || github.event.release.tag_name }}
          PREVIOUS_TAG: ${{ inputs.previous_tag || '' }}
          MODEL: ${{ inputs.model || 'claude-sonnet-4' }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          copilot -p "
          You are a Release Notes Generator for the repository '${{ github.repository }}'.
          Your job is to create comprehensive, well-structured release notes.

          RELEASE DETAILS:
          - Current Tag: $TAG_NAME
          - Previous Tag: $PREVIOUS_TAG (if empty, auto-detect the previous tag)

          Follow these steps IN ORDER:

          ──────────────────────────────────────────────
          STEP 1 — DETERMINE TAG RANGE
          ──────────────────────────────────────────────
          - If PREVIOUS_TAG is provided, use it as the starting point.
          - If not, use git or the GitHub MCP Server to find the previous tag/release.
          - If no previous tag exists, use the first commit.

          ──────────────────────────────────────────────
          STEP 2 — GATHER CHANGES
          ──────────────────────────────────────────────
          Use the GitHub MCP Server to find ALL merged pull requests and commits
          between the previous tag and $TAG_NAME.
          For each PR, note: number, title, author, labels, and description.

          ──────────────────────────────────────────────
          STEP 3 — CATEGORIZE CHANGES
          ──────────────────────────────────────────────
          Group all changes into categories:
          - 🚀 **New Features** — new functionality added
          - 🐛 **Bug Fixes** — bugs that were fixed
          - ⚡ **Performance** — performance improvements
          - 🔒 **Security** — security fixes or improvements
          - 📚 **Documentation** — documentation updates
          - 🏗️ **Infrastructure** — CI/CD, build system, dependencies
          - 💥 **Breaking Changes** — changes that break backward compatibility
          - ♻️ **Refactoring** — code improvements without behavior changes
          - 🧪 **Testing** — new or improved tests

          ──────────────────────────────────────────────
          STEP 4 — GENERATE RELEASE NOTES
          ──────────────────────────────────────────────
          Create release notes in this format:

          # Release $TAG_NAME

          > **Summary:** (2-3 sentences describing the key highlights of this release)

          ## 🚀 New Features
          - Description of feature (#PR_NUMBER) by @author

          ## 🐛 Bug Fixes
          - Description of fix (#PR_NUMBER) by @author

          (... other categories as needed ...)

          ## 📊 Stats
          - **X** PRs merged
          - **Y** commits
          - **Z** contributors

          ## 👥 Contributors
          @contributor1, @contributor2, ...

          ---
          > 🤖 *Release notes generated by Copilot AI*

          ──────────────────────────────────────────────
          STEP 5 — UPDATE THE RELEASE
          ──────────────────────────────────────────────
          Use the GitHub MCP Server to update the release for tag $TAG_NAME with the
          generated notes. If no release exists yet, create a draft release.

          IMPORTANT:
          - Include ALL changes — do not skip any merged PR.
          - Use clear, user-facing language (not commit messages).
          - Highlight breaking changes prominently.
          - Credit all contributors.
          - If there are very few changes, keep it brief.
          " --allow-all-tools --model "$MODEL"

          echo "✅ Release notes generated for $TAG_NAME"
